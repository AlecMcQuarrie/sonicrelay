name: Build & Release

on:
  push:
    branches: [master]

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version from package.json
        id: version
        run: echo "version=$(node -p "require('./client/package.json').version")" >> $GITHUB_OUTPUT

      - name: Check if release already exists
        id: check
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" > /dev/null 2>&1; then
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: release/*.exe
          - os: macos-latest
            artifact: release/*.dmg
          - os: ubuntu-latest
            artifact: release/*.AppImage
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build client (SPA mode)
        run: npx cross-env ELECTRON=true npx react-router build

      - name: Compile Electron TypeScript
        run: npm run electron:compile

      - name: Get Electron version
        id: electron
        run: echo "version=$(node -p "require('electron/package.json').version")" >> $GITHUB_OUTPUT

      - name: Install electron-builder globally
        run: npm install -g electron-builder

      - name: Prepare packaging directory
        run: |
          mkdir -p packaging/public
          cp -r build packaging/
          cp -r dist-electron packaging/
          cp electron-builder.yml packaging/
          cp public/SonicRelayLogo.png packaging/public/
          node -e "
            const pkg = require('./package.json');
            const out = { name: pkg.name, version: pkg.version, main: 'dist-electron/main.cjs', type: 'commonjs' };
            require('fs').writeFileSync('packaging/package.json', JSON.stringify(out, null, 2));
          "
          node -e "
            const f = 'packaging/electron-builder.yml';
            const fs = require('fs');
            fs.writeFileSync(f, fs.readFileSync(f, 'utf8').replace('signAndEditExecutable: false', 'signAndEditExecutable: true'));
          "
          rm -rf node_modules

      - name: Build Electron app
        working-directory: client/packaging
        run: electron-builder --publish never -c.electronVersion=${{ steps.electron.outputs.version }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: client/packaging/release/*

  release:
    needs: [check-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        run: |
          gh release create "v${{ needs.check-version.outputs.version }}" \
            --title "v${{ needs.check-version.outputs.version }}" \
            --generate-notes \
            artifacts/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
