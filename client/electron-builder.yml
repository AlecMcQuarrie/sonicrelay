appId: com.sonicrelay.client
productName: SonicRelay
directories:
  buildResources: build
  output: dist-electron
files:
  - build/client/**/*
  - electron/**/*.js
  - "!node_modules/**/*"
  - node_modules/**/*.js
  - node_modules/**/*.json
extraMetadata:
  main: electron/main.js
win:
  target: portable
mac:
  target: dmg
linux:
  target: AppImage
publish:
  provider: github
