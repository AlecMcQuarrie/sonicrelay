appId: com.sonicrelay.client
productName: SonicRelay
directories:
  output: release
files:
  - "build/client/**/*"
  - "dist-electron/**/*"
  - "package.json"
  - "!node_modules/**/*"
asar: false
npmRebuild: false
nodeGypRebuild: false
buildDependenciesFromSource: false
extraMetadata:
  main: dist-electron/main.cjs
  type: commonjs
icon: public/SonicRelayLogo.png
win:
  target: portable
  signAndEditExecutable: false
mac:
  target: dmg
  identity: null
linux:
  target: AppImage
