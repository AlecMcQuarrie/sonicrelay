appId: com.sonicrelay.client
productName: SonicRelay
directories:
  output: release
files:
  - "build/client/**/*"
  - "dist-electron/**/*"
  - "package.json"
  - "!node_modules/**/*"
  # @nut-tree-fork/nut-js and its full transitive dep tree — jimp (image
  # processing for screen-matching, eagerly required by nut-js) alone pulls
  # ~100 packages. The list is mechanical: it's whatever `npm list` reports
  # under @nut-tree-fork/nut-js. If a new nut-js version adds a dep, add it
  # here or nut-js fails to load at runtime with a "Cannot find module" error.
  - "node_modules/@jimp/**/*"
  - "node_modules/@nut-tree-fork/**/*"
  - "node_modules/@sec-ant/**/*"
  - "node_modules/@sindresorhus/**/*"
  - "node_modules/@tokenizer/**/*"
  - "node_modules/any-base/**/*"
  - "node_modules/arch/**/*"
  - "node_modules/base64-js/**/*"
  - "node_modules/bindings/**/*"
  - "node_modules/bmp-js/**/*"
  - "node_modules/buffer/**/*"
  - "node_modules/buffer-equal/**/*"
  - "node_modules/centra/**/*"
  - "node_modules/clipboardy/**/*"
  - "node_modules/cross-spawn/**/*"
  - "node_modules/data-uri-to-buffer/**/*"
  - "node_modules/dom-walk/**/*"
  - "node_modules/execa/**/*"
  - "node_modules/exif-parser/**/*"
  - "node_modules/fetch-blob/**/*"
  - "node_modules/figures/**/*"
  - "node_modules/file-type/**/*"
  - "node_modules/file-uri-to-path/**/*"
  - "node_modules/follow-redirects/**/*"
  - "node_modules/formdata-polyfill/**/*"
  - "node_modules/get-stream/**/*"
  - "node_modules/gifwrap/**/*"
  - "node_modules/global/**/*"
  - "node_modules/human-signals/**/*"
  - "node_modules/ieee754/**/*"
  - "node_modules/image-q/**/*"
  - "node_modules/inherits/**/*"
  - "node_modules/is-docker/**/*"
  - "node_modules/is-function/**/*"
  - "node_modules/is-inside-container/**/*"
  - "node_modules/is-plain-obj/**/*"
  - "node_modules/is-stream/**/*"
  - "node_modules/is-unicode-supported/**/*"
  - "node_modules/is-wsl/**/*"
  - "node_modules/isexe/**/*"
  - "node_modules/isomorphic-fetch/**/*"
  - "node_modules/jimp/**/*"
  - "node_modules/jpeg-js/**/*"
  - "node_modules/load-bmfont/**/*"
  - "node_modules/mime/**/*"
  - "node_modules/min-document/**/*"
  - "node_modules/node-abort-controller/**/*"
  - "node_modules/node-domexception/**/*"
  - "node_modules/node-fetch/**/*"
  - "node_modules/npm-run-path/**/*"
  - "node_modules/omggif/**/*"
  - "node_modules/pako/**/*"
  - "node_modules/parse-bmfont-ascii/**/*"
  - "node_modules/parse-bmfont-binary/**/*"
  - "node_modules/parse-bmfont-xml/**/*"
  - "node_modules/parse-headers/**/*"
  - "node_modules/parse-ms/**/*"
  - "node_modules/path-key/**/*"
  - "node_modules/peek-readable/**/*"
  - "node_modules/phin/**/*"
  - "node_modules/pixelmatch/**/*"
  - "node_modules/pngjs/**/*"
  - "node_modules/pretty-ms/**/*"
  - "node_modules/process/**/*"
  - "node_modules/readable-stream/**/*"
  - "node_modules/readable-web-to-node-stream/**/*"
  - "node_modules/regenerator-runtime/**/*"
  - "node_modules/safe-buffer/**/*"
  - "node_modules/sax/**/*"
  - "node_modules/shebang-command/**/*"
  - "node_modules/shebang-regex/**/*"
  - "node_modules/signal-exit/**/*"
  - "node_modules/string_decoder/**/*"
  - "node_modules/strip-final-newline/**/*"
  - "node_modules/strtok3/**/*"
  - "node_modules/timm/**/*"
  - "node_modules/tinycolor2/**/*"
  - "node_modules/token-types/**/*"
  - "node_modules/unicorn-magic/**/*"
  - "node_modules/utif2/**/*"
  - "node_modules/util-deprecate/**/*"
  - "node_modules/web-streams-polyfill/**/*"
  - "node_modules/whatwg-fetch/**/*"
  - "node_modules/which/**/*"
  - "node_modules/xhr/**/*"
  - "node_modules/xml-parse-from-string/**/*"
  - "node_modules/xml2js/**/*"
  - "node_modules/xmlbuilder/**/*"
  - "node_modules/xtend/**/*"
  - "node_modules/yoctocolors/**/*"
asar: false
npmRebuild: true
extraMetadata:
  main: dist-electron/main.cjs
  type: commonjs
icon: public/SonicRelayLogo.png
win:
  target: portable
  executableName: SonicRelay
mac:
  target: dmg
  identity: "-"
linux:
  target: AppImage
publish: null
