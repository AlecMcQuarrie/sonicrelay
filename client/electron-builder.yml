appId: com.sonicrelay.client
productName: SonicRelay
directories:
  output: release
files:
  - "build/client/**/*"
  - "dist-electron/**/*"
  - "package.json"
  - "!node_modules/**/*"
  # Exact transitive dep closure for @nut-tree-fork/nut-js, generated by
  # walking each package's `dependencies` AND `optionalDependencies` from
  # the real node_modules tree (so nested resolutions like
  # isomorphic-fetch → pinned node-fetch@2 → whatwg-url/tr46/webidl-
  # conversions, and libnut-darwin's optional node-mac-permissions,
  # are included). `node_modules/**/*` can't be used as a shortcut:
  # `shadcn` (a codegen CLI listed in dependencies) pulls in @babel,
  # @modelcontextprotocol/sdk, @mswjs, @dotenvx, @ts-morph, etc. —
  # ~200 extra packages that bloat the portable to 90MB+ and make its
  # self-extractor hang on launch.
  #
  # To regenerate when nut-js version changes, walk @nut-tree-fork/nut-js
  # and every transitive dep's `dependencies` + `optionalDependencies`
  # field, preferring nested node_modules copies over top-level during
  # resolution. Optional deps matter: libnut-darwin's
  # node-mac-permissions is how screen-control gets TCC access on macOS.
  - "node_modules/@jimp/bmp/**/*"
  - "node_modules/@jimp/core/**/*"
  - "node_modules/@jimp/custom/**/*"
  - "node_modules/@jimp/gif/**/*"
  - "node_modules/@jimp/jpeg/**/*"
  - "node_modules/@jimp/plugin-blit/**/*"
  - "node_modules/@jimp/plugin-blur/**/*"
  - "node_modules/@jimp/plugin-circle/**/*"
  - "node_modules/@jimp/plugin-color/**/*"
  - "node_modules/@jimp/plugin-contain/**/*"
  - "node_modules/@jimp/plugin-cover/**/*"
  - "node_modules/@jimp/plugin-crop/**/*"
  - "node_modules/@jimp/plugin-displace/**/*"
  - "node_modules/@jimp/plugin-dither/**/*"
  - "node_modules/@jimp/plugin-fisheye/**/*"
  - "node_modules/@jimp/plugin-flip/**/*"
  - "node_modules/@jimp/plugin-gaussian/**/*"
  - "node_modules/@jimp/plugin-invert/**/*"
  - "node_modules/@jimp/plugin-mask/**/*"
  - "node_modules/@jimp/plugin-normalize/**/*"
  - "node_modules/@jimp/plugin-print/**/*"
  - "node_modules/@jimp/plugin-resize/**/*"
  - "node_modules/@jimp/plugin-rotate/**/*"
  - "node_modules/@jimp/plugin-scale/**/*"
  - "node_modules/@jimp/plugin-shadow/**/*"
  - "node_modules/@jimp/plugin-threshold/**/*"
  - "node_modules/@jimp/plugins/**/*"
  - "node_modules/@jimp/png/**/*"
  - "node_modules/@jimp/tiff/**/*"
  - "node_modules/@jimp/types/**/*"
  - "node_modules/@jimp/utils/**/*"
  - "node_modules/@nut-tree-fork/default-clipboard-provider/**/*"
  - "node_modules/@nut-tree-fork/libnut-darwin/**/*"
  - "node_modules/@nut-tree-fork/libnut-linux/**/*"
  - "node_modules/@nut-tree-fork/libnut-win32/**/*"
  - "node_modules/@nut-tree-fork/libnut/**/*"
  - "node_modules/@nut-tree-fork/nut-js/**/*"
  # optionalDependency of libnut-darwin. Contains a native .node binary
  # that libnut loads on macOS for TCC / Screen Recording prompts —
  # without it, the first screen-control call on mac silently fails.
  - "node_modules/@nut-tree-fork/node-mac-permissions/**/*"
  # nested node-addon-api — pinned to a different major than any
  # top-level copy, so electron-builder won't find it via the glob above.
  - "node_modules/@nut-tree-fork/node-mac-permissions/node_modules/node-addon-api/**/*"
  - "node_modules/@nut-tree-fork/provider-interfaces/**/*"
  - "node_modules/@nut-tree-fork/shared/**/*"
  - "node_modules/@tokenizer/token/**/*"
  - "node_modules/abort-controller/**/*"
  - "node_modules/any-base/**/*"
  - "node_modules/arch/**/*"
  - "node_modules/base64-js/**/*"
  - "node_modules/bindings/**/*"
  - "node_modules/bmp-js/**/*"
  - "node_modules/buffer-equal/**/*"
  - "node_modules/buffer/**/*"
  - "node_modules/centra/**/*"
  - "node_modules/clipboardy/**/*"
  # Nested node_modules — electron-builder prunes them unless listed
  # explicitly, even though the parent glob above would match. Each entry
  # here exists because its parent package pins a specific version that
  # differs from the top-level copy (e.g., clipboardy pins execa@1 while
  # other packages use newer majors; isomorphic-fetch pins node-fetch@2
  # while top-level is v3).
  - "node_modules/clipboardy/node_modules/cross-spawn/**/*"
  - "node_modules/clipboardy/node_modules/execa/**/*"
  - "node_modules/clipboardy/node_modules/get-stream/**/*"
  - "node_modules/clipboardy/node_modules/is-docker/**/*"
  - "node_modules/clipboardy/node_modules/is-stream/**/*"
  - "node_modules/clipboardy/node_modules/is-wsl/**/*"
  - "node_modules/clipboardy/node_modules/isexe/**/*"
  - "node_modules/clipboardy/node_modules/npm-run-path/**/*"
  - "node_modules/clipboardy/node_modules/path-key/**/*"
  - "node_modules/clipboardy/node_modules/semver/**/*"
  - "node_modules/clipboardy/node_modules/shebang-command/**/*"
  - "node_modules/clipboardy/node_modules/shebang-regex/**/*"
  - "node_modules/clipboardy/node_modules/signal-exit/**/*"
  - "node_modules/clipboardy/node_modules/which/**/*"
  - "node_modules/dom-walk/**/*"
  - "node_modules/end-of-stream/**/*"
  - "node_modules/event-target-shim/**/*"
  - "node_modules/events/**/*"
  - "node_modules/exif-parser/**/*"
  - "node_modules/file-type/**/*"
  - "node_modules/file-uri-to-path/**/*"
  - "node_modules/follow-redirects/**/*"
  - "node_modules/gifwrap/**/*"
  - "node_modules/global/**/*"
  - "node_modules/ieee754/**/*"
  - "node_modules/image-q/**/*"
  - "node_modules/image-q/node_modules/@types/node/**/*"
  - "node_modules/is-function/**/*"
  - "node_modules/isomorphic-fetch/**/*"
  - "node_modules/isomorphic-fetch/node_modules/node-fetch/**/*"
  - "node_modules/jimp/**/*"
  - "node_modules/jpeg-js/**/*"
  - "node_modules/load-bmfont/**/*"
  - "node_modules/mime/**/*"
  - "node_modules/min-document/**/*"
  - "node_modules/nice-try/**/*"
  - "node_modules/node-abort-controller/**/*"
  - "node_modules/omggif/**/*"
  - "node_modules/once/**/*"
  - "node_modules/p-finally/**/*"
  - "node_modules/pako/**/*"
  - "node_modules/parse-bmfont-ascii/**/*"
  - "node_modules/parse-bmfont-binary/**/*"
  - "node_modules/parse-bmfont-xml/**/*"
  - "node_modules/parse-headers/**/*"
  - "node_modules/peek-readable/**/*"
  - "node_modules/phin/**/*"
  - "node_modules/pixelmatch/**/*"
  - "node_modules/pixelmatch/node_modules/pngjs/**/*"
  - "node_modules/pngjs/**/*"
  - "node_modules/process/**/*"
  - "node_modules/pump/**/*"
  - "node_modules/readable-web-to-node-stream/**/*"
  - "node_modules/readable-web-to-node-stream/node_modules/buffer/**/*"
  - "node_modules/readable-web-to-node-stream/node_modules/readable-stream/**/*"
  - "node_modules/regenerator-runtime/**/*"
  - "node_modules/safe-buffer/**/*"
  - "node_modules/sax/**/*"
  - "node_modules/string_decoder/**/*"
  - "node_modules/strip-eof/**/*"
  - "node_modules/strtok3/**/*"
  - "node_modules/timm/**/*"
  - "node_modules/tinycolor2/**/*"
  - "node_modules/token-types/**/*"
  - "node_modules/tr46/**/*"
  - "node_modules/utif2/**/*"
  - "node_modules/webidl-conversions/**/*"
  - "node_modules/whatwg-fetch/**/*"
  - "node_modules/whatwg-url/**/*"
  - "node_modules/wrappy/**/*"
  - "node_modules/xhr/**/*"
  - "node_modules/xml-parse-from-string/**/*"
  - "node_modules/xml2js/**/*"
  - "node_modules/xml2js/node_modules/xmlbuilder/**/*"
  - "node_modules/xtend/**/*"
asar: false
npmRebuild: true
extraMetadata:
  main: dist-electron/main.cjs
  type: commonjs
icon: public/SonicRelayLogo.png
win:
  target: portable
  executableName: SonicRelay
mac:
  target: dmg
  identity: "-"
linux:
  target: AppImage
publish: null
