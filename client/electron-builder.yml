appId: com.sonicrelay.client
productName: SonicRelay
directories:
  output: release
files:
  - "build/client/**/*"
  - "dist-electron/**/*"
  - "!node_modules"
  - "!electron"
  - "!app"
  - "!public"
asar: false
npmRebuild: false
extraMetadata:
  main: dist-electron/main.cjs
win:
  target: portable
  signAndEditExecutable: false
mac:
  target: dmg
linux:
  target: AppImage
