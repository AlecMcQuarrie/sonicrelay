appId: com.sonicrelay.client
productName: SonicRelay
directories:
  buildResources: build
  output: release
files:
  - build/client/**/*
  - dist-electron/**/*
extraMetadata:
  main: dist-electron/main.js
win:
  target: portable
mac:
  target: dmg
linux:
  target: AppImage
publish:
  provider: github
