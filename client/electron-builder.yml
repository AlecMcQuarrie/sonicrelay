appId: com.sonicrelay.client
productName: SonicRelay
directories:
  output: release
files:
  - "build/client/**/*"
  - "dist-electron/**/*"
  - "package.json"
  # Include every production node_modules. electron-builder's prune step
  # removes devDependencies before this glob is evaluated, so build-only
  # packages (electron, electron-builder, vite, typescript, tailwind, etc.)
  # are automatically excluded. Maintaining an allowlist was too brittle —
  # nut-js's transitive tree reaches into nested node_modules (isomorphic-fetch
  # pins node-fetch@2 which needs whatwg-url, and so on), and every missed
  # package caused a runtime "Cannot find module" error. Better to pay a few
  # MB of client-dep duplication (react, mediasoup-client, etc., already in
  # build/client) than to chase the closure.
  - "node_modules/**/*"
asar: false
npmRebuild: true
extraMetadata:
  main: dist-electron/main.cjs
  type: commonjs
icon: public/SonicRelayLogo.png
win:
  target: portable
  executableName: SonicRelay
mac:
  target: dmg
  identity: "-"
linux:
  target: AppImage
publish: null
